<!DOCTYPE html>
    <!-- The root that wraps all of the content on the page -->
	
	<head>
        <!-- Everything that we want to include on our webpage on initial load but keep hidden from the webpage visitor goes here. -->
		
		<meta charset="utf-8"> 
        <!-- The character set (pretty much any character you might use) your document is allowed to use and have no issues displaying -->
		
		<title>Dj's Second Page</title>
		
		<style>
            h1 {
                font-size: 32px;
                text-align: center;
                color: cadetblue;
            }

        </style>
        <!--This is also where your style tags should go so the browser has access to all of the style prior to trying to load the elements in the body. Can be included in body if needed but not common -->

	</head>

	<body>
		<!-- The page content goes in the body.-->

        <h1>This is a great page!</h1>
        <div>But this page is just a placeholder for greater things to come:)
            <span> You will be taken to youtube if you click. </span><span><a href="https://www.youtube.com/" target="_blank">Youtube</a></span>
            <!--  It is the placeholder for a link. You define the destination of a link using the href atribute. Target specifies where to open the linked doc -->
        </div>
		
	</body>
	
    <footer>
        This is my second page.
    </footer>
</html>
